<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Automação Mobile Final — CrediAmigo</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --verde: #25D366;
      --verde-escuro: #075E54;
      --verde-claro: #DCF8C6;
      --fundo: #F0F2F5;
      --texto: #111B21;
      --texto-suave: #667781;
      --borda: #E9EDEF;
      --vermelho: #EA0038;
    }

    body {
      background-color: var(--fundo);
      color: var(--texto);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .btn {
      transition: all 0.2s ease-in-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-sent { background-color: #D1FAE5; color: #065F46; }
    .badge-skip { background-color: #FEF3C7; color: #92400E; }
    .badge-pending { background-color: #E0E7FF; color: #3730A3; }
    .badge-ok { background-color: #D1FAE5; color: #065F46; }
    .badge-warn { background-color: #FEF3C7; color: #92400E; }
    .badge-danger { background-color: #FEE2E2; color: #991B1B; }

    .var-chip {
      background: #f0f2f5;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
      margin: 2px;
      border: 1px solid #e1e4e8;
    }

    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 2px;
    }

    tr.enviado { background-color: #f8fafc; opacity: 0.6; }
    tr.enviando { background-color: #f0fdf4; border-left: 3px solid var(--verde); }
  </style>
</head>
<body class="p-3 max-w-md mx-auto pb-12">

  <header class="mb-4 pb-3 border-b border-gray-200 text-center">
    <h1 class="text-xl font-bold text-[--verde-escuro]">🤖 Disparador Mobile Completo</h1>
    <p class="text-xs text-[--texto-suave]">Gestão de Envios & Proteção Anti-Bloqueio</p>
    <div class="mt-1.5">
      <span id="statusBadge" class="bg-gray-200 text-gray-700 px-3 py-0.5 rounded-full text-[11px] font-bold">⚪ Aguardando</span>
    </div>
  </header>

  <div id="alertGlobal" class="hidden mb-3 p-2.5 rounded-lg text-xs font-medium text-center"></div>

  <div class="card p-4 mb-4">
    <div class="flex gap-2 mb-3 border-b pb-2">
      <button id="abaManual" onclick="trocarAba('manual')" class="flex-1 py-2 text-xs font-bold rounded-lg border btn bg-[--verde] text-white border-[--verde]">✏️ Manual</button>
      <button id="abaExcel" onclick="trocarAba('excel')" class="flex-1 py-2 text-xs font-bold rounded-lg border btn bg-white text-[--texto-suave] border-[--borda]">📁 Excel</button>
    </div>

    <div id="painelManual">
      <label class="block text-[11px] font-bold text-gray-600 mb-1">Cole os números (um por linha com DDD):</label>
      <textarea id="inputTel" rows="4" class="w-full p-2 text-xs border rounded-lg focus:outline-none focus:border-[--verde]" placeholder="73999999999&#10;73988888888"></textarea>
      <button onclick="adicionarManual()" class="w-full mt-2 bg-[--verde-escuro] text-white text-xs font-bold py-2.5 rounded-lg btn">Adicionar à Lista</button>
    </div>

    <div id="painelExcel" class="hidden">
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-5 text-center">
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFile(event)">
        <label for="fileInput" class="cursor-pointer block text-xs font-semibold text-gray-600">
          <span class="block text-2xl mb-1">📊</span>
          Selecionar Planilha no Celular
        </label>
      </div>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <div class="flex justify-between items-center mb-2">
      <h2 class="text-xs font-bold text-gray-700">💬 Mensagem Inteligente</h2>
      <label class="flex items-center gap-1 scale-90 origin-right">
        <input type="checkbox" id="toggleAlternar" class="rounded text-[--verde]" checked>
        <span class="text-[11px] font-medium text-gray-500">Alternar</span>
      </label>
    </div>

    <div class="flex gap-1 mb-2">
      <button id="tabMsg0" onclick="selecionarModelo(0)" class="flex-1 py-1 text-[11px] font-bold border rounded bg-[--verde] text-white">Mod 1</button>
      <button id="tabMsg1" onclick="selecionarModelo(1)" class="flex-1 py-1 text-[11px] font-bold border rounded bg-white text-gray-500">Mod 2</button>
      <button id="tabMsg2" onclick="selecionarModelo(2)" class="flex-1 py-1 text-[11px] font-bold border rounded bg-white text-gray-500">Mod 3</button>
    </div>

    <textarea id="msgEditor" rows="6" class="w-full p-2 text-xs border rounded-lg focus:outline-none focus:border-[--verde]" oninput="atualizarPreview()"></textarea>
    
    <div class="mt-1">
      <span class="var-chip" onclick="inserirVar('{NOME}')">{NOME}</span>
      <span class="var-chip" onclick="inserirVar('{PRIMEIRO_NOME}')">{1º NOME}</span>
      <span class="var-chip" onclick="inserirVar('{VALOR}')">{VALOR}</span>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <h2 class="text-xs font-bold text-gray-700 mb-2">⚙️ Painel Antiban Automático</h2>
    
    <div class="mb-3">
      <div class="flex justify-between text-[11px] text-gray-600 mb-1">
        <span>Intervalo de Espera:</span>
        <span id="intervaloValor" class="font-bold text-[--verde-escuro]">10 segundos</span>
      </div>
      <input type="range" id="intervaloRange" min="4" max="30" value="10" class="w-full accent-[--verde]" oninput="document.getElementById('intervaloValor').textContent = this.value + ' segundos'">
      <label class="flex items-center gap-1.5 mt-2 cursor-pointer">
        <input type="checkbox" id="toggleVariacao" class="rounded text-[--verde]" checked>
        <span class="text-[10px] text-gray-500">Adicionar variação humana randômica (+/- 40%)</span>
      </label>
    </div>

    <div class="flex flex-col gap-2 pt-2 border-t border-gray-100">
      <button id="btnIniciar" onclick="iniciarDisparo()" class="w-full bg-[--verde] text-white font-bold py-3 rounded-xl text-sm btn" disabled>▶️ Iniciar Envio Automático</button>
      <div class="flex gap-2">
        <button id="btnPausar" onclick="pausarDisparo()" class="hidden flex-1 bg-amber-500 text-white font-bold py-2.5 rounded-xl text-xs btn">⏸ Pausar</button>
        <button id="btnResumir" onclick="resumirDisparo()" class="hidden flex-1 bg-indigo-600 text-white font-bold py-2.5 rounded-xl text-xs btn">▶️ Retomar</button>
        <button id="btnParar" onclick="pararDisparo()" class="hidden bg-rose-600 text-white font-bold py-2.5 px-4 rounded-xl text-xs btn">⛔ Parar</button>
      </div>
    </div>

    <div id="progressSection" class="hidden mt-3 pt-3 border-t">
      <div class="flex justify-between text-[10px] font-semibold text-gray-500 mb-1">
        <span id="progressText">0 de 0 processados</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-1.5">
        <div id="progressFill" class="bg-[--verde] h-1.5 rounded-full" style="width: 0%"></div>
      </div>
      <div id="currentSending" class="text-xs font-bold text-center text-amber-600 mt-2"></div>
    </div>
  </div>

  <div id="statsBar" class="hidden grid grid-cols-4 gap-1.5 mb-4 text-center">
    <div class="bg-white p-2 rounded-xl border border-gray-100"><span class="block text-[10px] text-gray-400">Total</span><span id="statTotal" class="text-xs font-bold text-gray-700">0</span></div>
    <div class="bg-white p-2 rounded-xl border border-gray-100"><span class="block text-[10px] text-gray-400">Fila</span><span id="statPendente" class="text-xs font-bold text-indigo-600">0</span></div>
    <div class="bg-white p-2 rounded-xl border border-gray-100"><span class="block text-[10px] text-gray-400">Envios</span><span id="statEnviado" class="text-xs font-bold text-green-600">0</span></div>
    <div class="bg-white p-2 rounded-xl border border-gray-100"><span class="block text-[10px] text-gray-400">Pulos</span><span id="statPulados" class="text-xs font-bold text-amber-600">0</span></div>
  </div>

  <div class="card p-4">
    <div id="filtrosBar" class="hidden flex-col gap-2 mb-3 pb-2 border-b">
      <input type="text" id="searchInput" oninput="aplicarFiltros()" placeholder="🔎 Buscar..." class="p-1.5 text-xs border rounded-md focus:outline-none w-full bg-gray-50">
      <div class="flex gap-1">
        <select id="filtroAtraso" onchange="aplicarFiltros()" class="flex-1 p-1 text-[11px] border rounded bg-white">
          <option value="">⏱️ Todos os prazos</option>
          <option value="0">Em dia</option>
          <option value="1">1-2 meses</option>
          <option value="3">3+ meses</option>
        </select>
        <select id="filtroStatus" onchange="aplicarFiltros()" class="flex-1 p-1 text-[11px] border rounded bg-white">
          <option value="">📊 Todos status</option>
          <option value="pendente">Fila</option>
          <option value="enviado">Enviados</option>
        </select>
      </div>
    </div>

    <div id="alertSemClientes" class="text-center py-4 text-gray-400 text-xs">📭 Ninguém na fila. Adicione contatos.</div>
    <div id="tableWrap" class="overflow-x-auto max-h-[250px] custom-scroll"></div>

    <div id="paginacaoBar" class="hidden justify-between items-center gap-2 mt-2 pt-2 border-t text-[10px]">
      <span id="paginacaoInfo" class="text-gray-400">0–0 de 0</span>
      <div id="paginacaoBtns" class="flex gap-1"></div>
    </div>
  </div>

  <div id="previewBubble" class="hidden"></div>

  <script>
    // ===== MODELOS OFICIAIS =====
    const MODELOS = [
`🚨 *CREDIAMIGO — OPORTUNIDADE EXCLUSIVA* 🚨

Olá, *{NOME}*! 👋

Identificamos que você já foi cliente CrediAmigo e gostaríamos de te convidar de volta com condições *especiais* para quem quer investir no próprio negócio.

💰 *Crédito de até R$ 21.000*
✅ Juros reduzidos e diferenciados
📦 Reforço de estoque e capital de giro
⏳ Até *60 dias* para começar a pagar*
⚡ Análise rápida e atendimento simplificado

Você já tem histórico conosco — isso conta muito! 🤝

📲 Responda *QUERO* e entraremos em contato para apresentar as condições disponíveis para você.

_*Condições sujeitas à análise de crédito._`,

`👋 *{NOME}*, sentimos a sua falta no *CrediAmigo!*

Você já conhece o nosso programa e sabe que o *Banco do Nordeste* está sempre ao lado de quem empreende. 💚

Por isso, preparamos uma *oferta exclusiva para ex-clientes* voltarem a crescer com a gente:

💰 Crédito de até *R$ 21.000* com juros especiais
⏳ Até *60 dias* para começar a pagar*
📦 Ideal para estoque, capital de giro e muito mais
⚡ Atendimento rápido e personalizado

Não deixe o seu negócio esperando! Responda *VOLTAR* agora mesmo e nossa equipe entra em contato. 🚀

_*Condições sujeitas à análise de crédito._`,

`🔔 *Aviso importante para você, {NOME}!*

O *CrediAmigo — Banco do Nordeste* está com uma ação especial de retorno e *seu nome está na lista de ex-clientes selecionados.* 🎯

Essa é a sua chance de retomar o fôlego do seu negócio:

✔️ *Juros reduzidos* para quem já foi cliente
✔️ Crédito de até *R$ 21.000*
✔️ Até *60 dias* para a 1ª parcela*
✔️ Processo simples, sem burocracia

⏳ *Essa condição é por tempo limitado!*

📲 Responda *SIM* agora e nossa equipe vai te atender com prioridade!

_*Condições sujeitas à análise de crédito._`
    ];

    let clientes = [];
    let clientesFiltrados = [];
    let paginaAtual = 1;
    const POR_PAGINA = 25;
    let disparando = false;
    let pausado = false;
    let indiceAtual = 0;
    let contadorModelo = 0;
    let timerAutomacao = null;

    function selecionarModelo(idx) {
      document.getElementById('msgEditor').value = MODELOS[idx];
      [0,1,2].forEach(i => {
        const btn = document.getElementById('tabMsg' + i);
        if (i === idx) {
          btn.className = "flex-1 py-1 text-[11px] font-bold border rounded bg-[--verde] text-white";
        } else {
          btn.className = "flex-1 py-1 text-[11px] font-bold border rounded bg-white text-gray-500";
        }
      });
      atualizarPreview();
    }

    function getMensagemAtual(cliente) {
      const alternar = document.getElementById('toggleAlternar').checked;
      if (alternar) {
        const idx = contadorModelo % 3;
        contadorModelo++;
        return aplicarVariaveis(MODELOS[idx], cliente);
      }
      return aplicarVariaveis(document.getElementById('msgEditor').value, cliente);
    }

    function aplicarVariaveis(msg, cliente) {
      const isManual = cliente.nome === 'Cliente' || cliente.nome === '__MANUAL__';
      const primeiroNome = isManual ? '' : cliente.nome.split(' ')[0];
      const nomeCompleto = isManual ? '' : cliente.nome;

      let resultado = msg;
      if (isManual) {
        resultado = resultado
          .replace(/Olá,\s*\*?\{NOME\}\*?!?\s*/gi, 'Olá! ')
          .replace(/👋\s*\*?\{NOME\}\*?,?\s*/gi, '👋 ')
          .replace(/🔔\s*\*Aviso importante para você,\s*\{NOME\}!\*/gi, '🔔 *Aviso importante para você!*')
          .replace(/\{NOME\}/gi, '').replace(/,\s*,/g, ',');
      } else {
        resultado = resultado.replace(/\{NOME\}/g, nomeCompleto).replace(/\{PRIMEIRO_NOME\}/g, primeiroNome);
      }
      return resultado.replace(/\{VALOR\}/g, `R$ ${Number(cliente.valor || 21000).toLocaleString('pt-BR')}`);
    }

    function trocarAba(aba) {
      const isManual = aba === 'manual';
      document.getElementById('painelManual').style.display = isManual ? 'block' : 'none';
      document.getElementById('painelExcel').style.display = isManual ? 'none' : 'block';
      
      document.getElementById('abaManual').className = isManual ? "flex-1 py-2 text-xs font-bold rounded-lg border btn bg-[--verde] text-white border-[--verde]" : "flex-1 py-2 text-xs font-bold rounded-lg border btn bg-white text-[--texto-suave] border-[--borda]";
      document.getElementById('abaExcel').className = !isManual ? "flex-1 py-2 text-xs font-bold rounded-lg border btn bg-[--verde] text-white border-[--verde]" : "flex-1 py-2 text-xs font-bold rounded-lg border btn bg-white text-[--texto-suave] border-[--borda]";
    }

    function adicionarManual() {
      const raw = document.getElementById('inputTel').value.trim();
      if(!raw) return;
      const linhas = raw.split('\n').map(l => l.trim().replace(/\D/g, '')).filter(l => l.length >= 10);
      
      linhas.forEach(tel => {
        const telFinal = tel.startsWith('55') ? tel : '55' + tel;
        if (!clientes.some(c => c.telefone === telFinal)) {
          clientes.push({ id: clientes.length, nome: 'Cliente', telefone: telFinal, valor: 21000, atraso: 0, status: 'pendente' });
        }
      });

      document.getElementById('inputTel').value = '';
      dispararSetupConcluido();
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          rows.forEach((row, i) => {
            const keys = Object.keys(row);
            const colNome = keys.find(k => /nome|cliente/i.test(k)) || keys[0];
            const colTel = keys.find(k => /tel|fone|cel|whats/i.test(k)) || keys[1];
            const colValor = keys.find(k => /valor/i.test(k)) || keys[2];
            const colAtraso = keys.find(k => /atraso/i.test(k)) || keys[3];

            let tel = String(row[colTel] || '').replace(/\D/g,'');
            if (tel.length >= 10) {
              if (!tel.startsWith('55')) tel = '55' + tel;
              clientes.push({
                id: clientes.length,
                nome: String(row[colNome] || 'Cliente').trim(),
                telefone: tel,
                valor: Number(row[colValor] || 21000),
                atraso: Number(row[colAtraso] || 0),
                status: 'pendente'
              });
            }
          });
          dispararSetupConcluido();
          feedbackFeedback('✅ Planilha importada com sucesso!', 'bg-green-100 text-green-800');
        } catch(err) {
          feedbackFeedback('❌ Erro ao ler planilha.', 'bg-red-100 text-red-800');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function dispararSetupConcluido() {
      clientesFiltrados = [...clientes];
      document.getElementById('statsBar').style.display = 'grid';
      document.getElementById('filtrosBar').style.display = 'flex';
      document.getElementById('paginacaoBar').style.display = 'flex';
      document.getElementById('alertSemClientes').style.display = 'none';
      document.getElementById('btnIniciar').disabled = false;
      atualizarStats();
      renderizarTabela();
    }

    function renderizarTabela() {
      const inicio = (paginaAtual - 1) * POR_PAGINA;
      const fim = Math.min(inicio + POR_PAGINA, clientesFiltrados.length);
      const paginados = clientesFiltrados.slice(inicio, fim);

      let html = `<table class="w-full text-[11px] text-left"><thead><tr class="bg-gray-50 text-gray-500 border-b"><th class="p-2">Nome/Tel</th><th class="p-2">Status</th></tr></thead><tbody>`;
      
      paginados.forEach(c => {
        const rowClass = c.status === 'enviado' ? 'enviado' : (clientes[indiceAtual] && c.id === clientes[indiceAtual].id && disparando) ? 'enviando' : '';
        const stBadge = c.status === 'enviado' ? '<span class="badge badge-sent">✓ OK</span>' : '<span class="badge badge-pending">Fila</span>';
        
        html += `<tr class="${rowClass} border-b">
          <td class="p-2"><b>${c.nome}</b><span class="block text-[10px] text-gray-400">${c.telefone}</span></td>
          <td class="p-2">${stBadge}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('tableWrap').innerHTML = html;

      // Paginação
      const totalPags = Math.ceil(clientesFiltrados.length / POR_PAGINA);
      document.getElementById('paginacaoInfo').textContent = `${inicio+1}–${fim} de ${clientesFiltrados.length}`;
      
      let pagHtml = '';
      if(paginaAtual > 1) pagHtml += `<button onclick="irPag(${paginaAtual-1})" class="px-1.5 py-0.5 bg-gray-200 rounded">‹</button>`;
      if(paginaAtual < totalPags) pagHtml += `<button onclick="irPag(${paginaAtual+1})" class="px-1.5 py-0.5 bg-gray-200 rounded">›</button>`;
      document.getElementById('paginacaoBtns').innerHTML = pagHtml;
    }

    function irPag(p) { paginaAtual = p; renderizarTabela(); }

    function aplicarFiltros() {
      const busca = document.getElementById('searchInput').value.toLowerCase();
      const atraso = document.getElementById('filtroAtraso').value;
      const status = document.getElementById('filtroStatus').value;

      clientesFiltrados = clientes.filter(c => {
        if (busca && !c.nome.toLowerCase().includes(busca) && !c.telefone.includes(busca)) return false;
        if (atraso === '0' && c.atraso !== 0) return false;
        if (atraso === '1' && (c.atraso < 1 || c.atraso > 2)) return false;
        if (atraso === '3' && c.atraso < 3) return false;
        if (status && c.status !== status) return false;
        return true;
      });
      paginaAtual = 1;
      renderizarTabela();
    }

    function atualizarStats() {
      document.getElementById('statTotal').textContent = clientes.length;
      document.getElementById('statPendente').textContent = clientes.filter(c => c.status === 'pendente').length;
      document.getElementById('statEnviado').textContent = clientes.filter(c => c.status === 'enviado').length;
      document.getElementById('statPulados').textContent = clientes.filter(c => c.status === 'pulado').length;
    }

    function atualizarPreview() {}
    function inserirVar(v) { document.getElementById('msgEditor').value += v; }

    // ===== MOTOR DE AUTOMAÇÃO AUTOMÁTICA MOBILE =====
    function iniciarDisparo() {
      if(clientes.filter(c => c.status === 'pendente').length === 0) return;
      disparando = true;
      pausado = false;
      contadorModelo = 0;

      document.getElementById('btnIniciar').style.display = 'none';
      document.getElementById('btnPausar').style.display = 'block';
      document.getElementById('btnParar').style.display = 'block';
      document.getElementById('progressSection').style.display = 'block';
      document.getElementById('statusBadge').className = "bg-green-100 text-green-800 px-3 py-0.5 rounded-full text-[11px] font-bold";
      document.getElementById('statusBadge').textContent = '🟢 Rodando';

      executarCicloAutomato();
    }

    function executarCicloAutomato() {
      if (!disparando || pausado) return;

      indiceAtual = clientes.findIndex(c => c.status === 'pendente');
      if (indiceAtual === -1) {
        concluirTudo();
        return;
      }

      const cliente = clientes[indiceAtual];
      const msgReal = getMensagemAtual(cliente);

      // Copia para área de transferência por conveniência
      try { navigator.clipboard.writeText(msgReal); } catch(e) {}

      // Executa o disparo chamando o App direto
      const urlMobile = `whatsapp://send?phone=${cliente.telefone}&text=${encodeURIComponent(msgReal)}`;
      
      cliente.status = 'enviado';
      atualizarStats();
      renderizarTabela();
      atualizarProgressoVisual();

      window.location.href = urlMobile;

      // Inicia contagem para o próximo da fila
      const baseTempo = parseInt(document.getElementById('intervaloRange').value) * 1000;
      let tempoCalculado = baseTempo;
      if (document.getElementById('toggleVariacao').checked) {
        const delta = baseTempo * 0.35;
        tempoCalculado = baseTempo + (Math.random() * delta * 2 - delta);
      }

      let segRestantes = Math.round(tempoCalculado / 1000);

      clearInterval(timerAutomacao);
      timerAutomacao = setInterval(() => {
        if (!disparando || pausado) { clearInterval(timerAutomacao); return; }
        
        if (segRestantes <= 0) {
          clearInterval(timerAutomacao);
          document.getElementById('currentSending').textContent = "🔄 Chamando próximo...";
          executarCicloAutomato();
        } else {
          document.getElementById('currentSending').textContent = `⏳ Próximo envio automático em ${segRestantes}s...`;
          segRestantes--;
        }
      }, 1000);
    }

    function atualizarProgressoVisual() {
      const total = clientes.length;
      const processados = clientes.filter(c => c.status !== 'pendente').length;
      const pct = total > 0 ? Math.round((processados / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPercent').textContent = pct + '%';
      document.getElementById('progressText').textContent = `${processados} de ${total} contatos`;
    }

    function pausarDisparo() {
      pausado = true;
      clearInterval(timerAutomacao);
      document.getElementById('btnPausar').style.display = 'none';
      document.getElementById('btnResumir').style.display = 'block';
      document.getElementById('statusBadge').textContent = '🟡 Pausado';
      document.getElementById('currentSending').textContent = "⏸ Automação Pausada";
    }

    function resumirDisparo() {
      pausado = false;
      document.getElementById('btnPausar').style.display = 'block';
      document.getElementById('btnResumir').style.display = 'none';
      document.getElementById('statusBadge').textContent = '🟢 Rodando';
      executarCicloAutomato();
    }

    function pararDisparo() {
      disparando = false;
      clearInterval(timerAutomacao);
      document.getElementById('btnIniciar').style.display = 'block';
      document.getElementById('btnPausar').style.display = 'none';
      document.getElementById('btnResumir').style.display = 'none';
      document.getElementById('btnParar').style.display = 'none';
      document.getElementById('statusBadge').className = "bg-gray-200 text-gray-700 px-3 py-0.5 rounded-full text-[11px] font-bold";
      document.getElementById('statusBadge').textContent = '⚪ Parado';
      document.getElementById('currentSending').textContent = "";
    }

    function concluirTudo() {
      disparando = false;
      clearInterval(timerAutomacao);
      document.getElementById('statusBadge').textContent = '✅ Concluído';
      document.getElementById('currentSending').textContent = "🎉 Envios finalizados!";
      feedbackFeedback('🎉 Sucesso! Todos da fila foram processados.', 'bg-green-100 text-green-800');
    }

    function feedbackFeedback(msg, classes) {
      const el = document.getElementById('alertGlobal');
      el.className = `mb-3 p-2.5 rounded-lg text-xs font-medium text-center ${classes}`;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    // Inicializa carregando a primeira mensagem oficial do CrediAmigo
    selecionarModelo(0);
  </script>
</body>
</html>
